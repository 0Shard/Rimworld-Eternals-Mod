name: Feature Request
description: Suggest a new feature or improvement for Eternal.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this useful? What problem does it solve or what gameplay scenario does it improve?
    validations:
      required: true
